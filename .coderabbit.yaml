language: "ko-KR"
tone_instructions: "한국어로 간결하게. 코드 예시는 영문 유지. 자명한 stylistic 지적은 생략."
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!**/*.lock"
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/.next/**"
    - "!**/.nuxt/**"
    - "!**/coverage/**"
    - "!**/__snapshots__/**"
  tools:
    eslint:
      enabled: true
    ruff:
      enabled: true
    markdownlint:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
chat:
  auto_reply: true
